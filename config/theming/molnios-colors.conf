# MolniOS Universal Color System Configuration
# Location: ~/.config/molnios/config/theming/molnios-colors.conf
# ==============================================================================
# This configuration defines backend priority and application template behavior
# for the unified color system.
#
# BACKEND_PRIORITY — Comma-separated list of backends to try in order
#   Supported backends: pywal16, wallust, matugen
#   First available backend will be used unless overridden by CLI flag
#   Default: pywal16,wallust,matugen
#
# GENERATE_TEMPLATES — Whether to generate application-specific templates
#   yes        Generate all templates after color extraction (default)
#   no         Only generate base pywal-compatible colors
#
# RELOAD_APPS — Whether to automatically reload applications after color change
#   yes        Reload waybar, dunst, swaync, kitty, etc. (default)
#   no         Skip automatic reloading (manual reload required)
#
# BORDERLINE — Whether to run borderline.sh for 2-color accent extraction
#   yes        Run borderline after color backend (default)
#   no         Skip borderline
# ==============================================================================

BACKEND_PRIORITY=pywal16,wallust,matugen
GENERATE_TEMPLATES=yes
RELOAD_APPS=yes
BORDERLINE=yes