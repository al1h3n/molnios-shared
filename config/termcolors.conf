# termcolors.conf - MolniOS terminal color theming defaults
# Location: ~/.config/molnios/termcolors.conf
# ==============================================================================
# These values are used ONLY when termcolors.sh is called without -w or -p flags
# (i.e. from a plain waypaper post_command with no explicit backend flag).
# CLI flags always take precedence over this file.
#
# BACKEND — which color tool generates the palette
#   wallust    Run wallust (default). Video → first frame extracted via ffmpeg.
#   pywal      Run pywal16 (wal -i). Supports video natively.
#   none       Skip color generation; only borderline runs (if BORDERLINE=yes).
#
# BORDERLINE — whether borderline.sh runs after the backend
#   yes        Run borderline after the color backend (default).
#   no         Skip borderline. Equivalent to passing -nb on the CLI.
# ==============================================================================

BACKEND=wallust
BORDERLINE=yes