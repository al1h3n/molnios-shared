# Universal Color Management Configuration
# Priority-based backend selection for MolniOS
# ==============================================================================
# This configuration replaces the old molnipaper.conf approach with a more
# flexible priority-based system supporting matugen/wallust/pywal16.
#
# BACKEND PRIORITY
#   The system will try backends in order until one is found.
#   Valid options: matugen, wallust, pywal16
#
# BORDERLINE
#   Whether to run borderline.sh for dynamic compositor borders
#   Options: yes, no
#
# AUTO_RELOAD
#   Whether to automatically reload applications after color changes
#   Options: yes, no
# ==============================================================================

# Backend priority (comma-separated, first available wins)
BACKEND_PRIORITY=matugen,wallust,pywal16

# Fallback if none of the priority backends are available
FALLBACK=wallust

# Run borderline for compositor borders
BORDERLINE=yes

# Automatically reload applications
AUTO_RELOAD=yes