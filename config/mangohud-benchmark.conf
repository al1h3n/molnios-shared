# MangoHud configuration - al1h3n edition.
# fps_limit=240,160
fps_limit=240,160,120,90,60,30,15
fps_limit_method=early # late - beter latency, early - more FPS.
vsync=-1 # -1 (let game decide), 0 (adaptive), 1 (off), 2 (better VSync than 3)
gl_vsync=0

# Visual.
legacy_layout=0

### Enable most of the toggleable parameters (currently excludes `histogram`)
# full

# fps_only # Show FPS only.

custom_text_center=MolniOS - mangohud (benchmark preset)

# Display FPS and frametime
fps
fps_color_change
fps_value=45,120
fps_color=B22222,FDFD09,39F900
fps_metrics=avg,0.001
# frame_timing
show_fps_limit

# GPU.
gpu_stats
gpu_temp
# gpu_core_clock
gpu_power
gpu_power_limit
gpu_text=GPU
gpu_load_change
gpu_load_value=60,90
gpu_fan

# CPU.
throttling_status
cpu_stats
cpu_temp
cpu_mhz
cpu_load_change

# Memory.
ram
swap # After RAM.

vram
gpu_mem_clock

### Display the current CPU load & frequency for each core
core_load
core_load_change
core_bars
core_type

arch # Show x86/x86_64
resolution
gamemode


display_server

### Display temperature in fahrenheit
# temp_fahrenheit

## Display efficiency in joules per frame
# flip_efficiency

### Display custom text
# custom_text=
### Display output of Bash command in next column
# exec=

# media_player

# Steam Deck.
fsr
hide_fsr_sharpness
hdr
refresh_rate
fan # Shows the Steam Deck fan rpm

### Change default font (set location to TTF/OTF file)
## Set font for the whole hud
font_file="JetBrainsMono Nerd Font"
font_file_text="JetBrainsMono Nerd Font"

round_corners=12
background_alpha=0.8
background_color=1E1E2E
table_columns=4

## Text ##
font_size=24
text_color=CDD6F4
text_outline_color=313244

## GPU ##
gpu_color=A6E3A1
gpu_load_color=CDD6F4,FAB387,F38BA8

## CPU ##
cpu_color=89B4FA
cpu_load_color=CDD6F4,FAB387,F38BA8

## RAM ##
ram_color=F5C2E7

## ENGINE ##
engine_color=F38BA8

## FPS ##
# fps_color_change=F38BA8,F9E2AF,A6E3A1

## Wine ##
wine
wine_color=F38BA8
winesync

## Frame timing ##
frametime_color=A6E3A1