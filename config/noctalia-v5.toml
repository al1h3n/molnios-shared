[bar]
order = [ "Main" ]

    [bar.Main]
    capsule_opacity = 0.79999998211860657
    capsule_padding = 8.0
    end = [
        "media",
        "SwayNC",
        "clipboard",
        "network",
        "bluetooth",
        "volume",
        "brightness",
        "battery",
        "wallpaper",
        "session"
    ]
    font_family = "SF Pro Display"
    font_weight = 700
    margin_edge = 0
    margin_ends = 0
    radius = 80
    radius_top_left = 0
    radius_top_right = 0
    scale = 1.2
    start = [ "launcher", "workspaces", "weather", "tray" ]
    thickness = 35
    widget_spacing = 14

        [bar.Main.dead_zone]
        command = "sh ~/.local/share/molnios/scripts/menu/launch-menu.sh"
        middle_command = "kitty -c $L_PATH/config/kitty/kitty.conf"
        scroll_down_command = """hyprctl dispatch \"hl.dsp.focus({ workspace = 'm-1' })\"
"""
        scroll_up_command = """hyprctl dispatch \"hl.dsp.focus({ workspace = 'm+1' })\"
"""

[brightness]
enable_ddcutil = true
minimum_brightness = 0.099999997764825821

[calendar]
enabled = true

    [calendar.account.google]
    name = "Google"
    type = "google"

[control_center]
sidebar = "full"
width = 800

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "dark_mode"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "audio"

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
enabled = true
inactive_opacity = 0.64999998547136784
launcher_position = "end"
main_axis_padding = 10
reserve_space = false

[idle]
behavior_order = [ "screen-off", "lock", "lock-and-suspend" ]
pre_action_fade_seconds = 10

    [idle.behavior.lock]
    action = "lock"
    enabled = false
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 600.0

[location]
address = "Almaty, Kazakhstan"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@winit", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1024.0
    cy = 1033.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@winit"]
    box_height = 70.0
    box_width = 400.0
    cx = 522.0
    cy = 1254.0
    output = "winit"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@winit".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
enabled = true

[notification]
background_opacity = 0.7799999825656414
enable_daemon = false
offset_x = 7
offset_y = 7

[plugins]
enabled = []

[shell]
app_icon_color = "on_error"
avatar_path = "/home/al1h3n/.local/share/molnios/molnios-media/avatars/archangel.jpg"
font_family = "SFMono Nerd Font"
password_style = "random"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
ui_scale = 1.1499999999999999

    [shell.panel]
    clipboard_placement = "attached"
    control_center_placement = "floating"
    launcher_compact = true
    launcher_session_search = true
    transparency_mode = "glass"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [[shell.session.actions]]
    action = "command"
    command = "hyprlock -q -c $L_PATH/config/hypr/hyprlock.conf"
    enabled = true
    label = "Hyprlock"
    variant = "default"

    [shell.shadow]
    alpha = 0.33000000000000002

[theme]
builtin = "Gruvbox"
community_palette = "Gruvbox Material"
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "gtk3", "gtk4", "hyprland", "kitty", "niri", "qt", "wezterm" ]
    community_ids = [ "pywalfox", "neovim", "yazi" ]

[wallpaper]
directory = "/home/al1h3n/.local/share/molnios/molnios-media/wallpapers/static"

    [wallpaper.default]
    path = "/home/al1h3n/.local/share/molnios/molnios-media/wallpapers/static/nature/6.jpg"

    [wallpaper.last]
    path = "/home/al1h3n/.local/share/molnios/molnios-media/wallpapers/static/nature/6.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/al1h3n/.local/share/molnios/molnios-media/wallpapers/static/nature/6.jpg"

[widget.SwayNC]
command = "swaync-client -t"
glyph = "bell"
right_command = "pkill swaync;swaync -c $L_PATH/config/swaync/swaync.json -s $L_PATH/config/swaync/swaync-style.css"
tooltip = "SwayNC notifications"
type = "custom_button"

[widget.clock]
format = "{:%d %b %H:%M}"

[widget.launcher]
capsule = true
capsule_padding = 18.0

[widget.volume]
scroll_step = 1

[widget.weather]
capsule = true

[widget.workspaces]
capsule = true
capsule_padding = 4
capsule_radius = 80
empty_color = "#006D6D"
focused_color = "#BBA070"
occupied_color = "#006D6D"
scale = 1.1000000000000001
