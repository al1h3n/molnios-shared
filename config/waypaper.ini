[Settings]
folder = ~/.local/share/molnios/molnios-media/wallpapers/static
         ~/.local/share/molnios/molnios-media/wallpapers/video
post_command = sh ~/.local/share/molnios/scripts/colors/molnios-colorgen.sh $wallpaper $video
number_of_columns = 5
swww_transition_type = random
swww_transition_fps = 144
mpvpaper_options = -s -o "--gpu-api=vulkan --loop --mute --no-osd-bar --no-input-default-bindings" ALL $video
stylesheet = ~/.local/share/molnios/config/waypaperstyle
fill = fit
subfolders = True
all_subfolders = True
show_hidden = True
mpvpaper_sound = False