# =============================================================================
# ~/.config/menu/style.conf  —  Example appearance config for menu.sh
# =============================================================================

# Backend: rofi or yad (omit to auto-detect)
BACKEND=rofi

# Window dimensions
# For rofi: WIDTH is pixels, HEIGHT is number of visible lines
# For yad:  WIDTH and HEIGHT are both pixels
WIDTH=400
HEIGHT=12

# Rofi: path to a .rasi theme file (optional)
# ROFI_THEME=/usr/share/rofi/themes/gruvbox-dark.rasi

# Rofi: inline theme overrides (appended on top of ROFI_THEME)
# ROFI_THEME_STR=window{border:2px;border-color:#89b4fa;}

# Yad: CSS string for GTK styling
# YAD_STYLE=.background{background:#1e1e2e;} .view{color:#cdd6f4;}

# Colors (used for both backends where applicable)
BG=#1e1e2e
FG=#cdd6f4
ACCENT=#89b4fa

# Font (Pango format)
FONT=JetBrains Mono Nerd Font 11